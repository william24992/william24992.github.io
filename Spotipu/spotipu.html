<!DOCTYPE html>
<html>
<head>
	<title>
		Spotipu
	</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<div id="container">
		<div id="login">
			<p style="font-size: 25px">Login to your Spotipu <br> Account</p>
			<p id="errorMsg"> </p>
			<p style="font-size: 20px">Username</p>
			<input type="text" name="pw" id="uname" placeholder="cheesie">
			<p style="font-size: 20px">Password</p>
			<input type="password" id="pass" placeholder="letmein"><br>
			<button onclick="login()" id="button">LOG IN</button>
			<div style="margin-top: 5px; font-size: 15px">Dont't have an account yet? Signup </div> <div id="hover"><a href="">here.</a></div>
		</div>
		<div id="view">
			<h1 style="color: rgb(48,184,106);">Get the right music, right now</h1>
			<p>to million of Songs for free.</p>
			<img src="Asset/icons/checkmark.png"><p style="display: inline-block;">Search and discover music you'll love</p><br>
			<img src="Asset/icons/checkmark.png"><p style="display: inline-block;">Create Playlist of your favourite music</p>
		</div>
	</div>
	<div id="page_view">
		
		<div id="left_view">
			<div style="height: 90%;width: 100%;" id="logo">
				<img src="Asset/icons/spotify-logo.png" style="margin-top: 10%; margin-left: 10%;"><br>
				<img src="Asset/icons/search.png" style="margin-top: 10%; margin-left: 10%;"><div>Search</div> <br>
				<img src="Asset/icons/home.png" style="margin-top: 10%; margin-left: 10%;"><div>Home</div><br>
				<img src="Asset/icons/lib.png" style="margin-top: 10%; margin-left: 10%;"><div>Your Library</div>
			</div>
			<div style="height: 10%; margin-left: 10%" id="log_out">
				<button id="logout_but">Log Out</button>				
			</div>
		</div>
		<div id="mid_view">
			
		</div>
		<div id="foot_view">
			<img src="Asset/genres/genre-indonesia.jpg" id="genres_view"   >
			<div id="label">Title <br style="color: lightgrey;">Various artist</div>
			<div style="margin-left: 20px;">
				<img src="Asset/icons/plus.png">
				<a href="#" onclick="playAudio()"><img src="Asset/icons/play.png"></a>
			</div>
			<audio id="music_play" >
				<source src="" type="audio/mp3">
			</audio>
		</div>
	</div>


	<script type="text/javascript" src="js.js"></script>
</body>
</html>
